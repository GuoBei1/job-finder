name: 每小时全网岗位自动聚合
on:
  schedule:
    - cron: '0 * * * *' # 每一小时执行一次
  workflow_dispatch: # 支持手动点击运行

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v2

      - name: 设置 Python 环境
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: 运行抓取脚本
        run: python scraper.py
          
      - name: 自动提交更新
        run: |
          git config --global user.name "guotao-bot"
          git config --global user.email "guotao@logic.com"
          git add .
          git commit -m "系统成交：每小时岗位数据同步" || exit 0
          git push
